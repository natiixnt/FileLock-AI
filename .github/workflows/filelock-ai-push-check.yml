name: FileLock AI Push Check

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  filelock-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # Branch-creation pushes use an all-zero "before" SHA.
          if [[ "${BEFORE}" == "0000000000000000000000000000000000000000" ]]; then
            git diff-tree --no-commit-id --name-only -r "${AFTER}" > changed-files.txt
          else
            git diff --name-only "${BEFORE}" "${AFTER}" > changed-files.txt
          fi

      - name: Run FileLock AI
        uses: ./.github/actions/filelock-ai-check
        with:
          policy_path: filelock-policy.yaml
          input_mode: diff
          input_path: changed-files.txt
          output_format: json
          fail_on: blocked_or_approval
          enforce: "true"
